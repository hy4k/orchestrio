version: '3.8'
services:
  backend:
    build: { context: ./backend }
    restart: always
    volumes: [ "./backend/data:/app/data" ]
    environment: [ "DATABASE_PATH=/app/data/orchestrio.db", "PORT=3001" ]
    networks: [ orchestrio-net ]
  frontend:
    build: { context: ./frontend }
    restart: always
    networks: [ orchestrio-net ]
  nginx:
    image: nginx:latest
    restart: always
    ports: [ "80:80", "443:443" ]
    volumes:
      - ./nginx/orchestrio.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt
    depends_on: [ backend, frontend ]
    networks: [ orchestrio-net ]
networks:
  orchestrio-net:
    driver: bridge
