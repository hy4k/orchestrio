server {
    listen 80;
    server_name orchestrio.in;

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name orchestrio.in;

    ssl_certificate      /etc/letsencrypt/live/orchestrio.in/fullchain.pem;
    ssl_certificate_key  /etc/letsencrypt/live/orchestrio.in/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/orchestrio.in/fullchain.pem;

    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }

    location /api {
        proxy_pass http://backend:3001;
    }

    location /socket.io {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
